site_name: FPVS Studio
site_description: Quickstart documentation for FPVS Studio users.
site_url: https://zcm58.github.io/FPVS-Studio-2.0/
repo_url: https://github.com/zcm58/FPVS-Studio-2.0
repo_name: zcm58/FPVS-Studio-2.0
docs_dir: docs-site
site_dir: site
strict: true

theme:
  name: material
  logo: assets/fpvs-studio-icon.png
  favicon: assets/fpvs-studio-icon.png
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: blue

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Prepare Images: prepare-images.md
  - Run A Session: run-session.md
  - Update FPVS Studio: updates.md
  - Publication And Citation: publication.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
